<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Dev/RN</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Blog Dev/RN</h1>
    </header>
    
    <main>
        <section class="editor">
            <h2>Escrever novo artigo</h2>
            <form id="post-form">
                <label for="titulo-post">Título do artigo</label>
                <input type="text" id="titulo-post" placeholder="Insira o título..." required>
                
                <label for="conteudo-post">Conteúdo do artigo</label>
                <textarea id="conteudo-post" rows="6" placeholder="Escreva o seu texto..." required></textarea>
                
                <button type="submit">Publicar no Blog</button>
            </form>
        </section>

        <section class="feed">
            <article class="post">
                <h2 id="renderizador-titulo"></h2>
                <p id="renderizador-conteudo"></p>
            </article>
        </section>
    </main>

</body>
</html>
